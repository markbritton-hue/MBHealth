<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Visits — MBHealth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="wrap">

<header>
  <div>
    <div class="pt-label">Health Dashboard</div>
    <div class="pt-name">Personal Health Dashboard</div>
    <div class="pt-meta">
      <span><em>Updated</em>Apr 24, 2026</span>
      <span><em>Source</em>MyChart · Epic Systems</span>
    </div>
  </div>
  <div class="hdr-right">
    <div class="updated">Last visit: <strong>May 11, 2026</strong></div>
  </div>
</header>

<div id="fasting-banner" style="border-radius:10px;padding:11px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;font-family:'DM Mono',monospace;font-size:13px;transition:background .5s;"></div>

<a href="index.html" class="back-btn">← Home</a>

<div class="sec-hdr"><div class="sec-title">Visit Records</div><div class="sec-sub">Doctor visits &amp; after-visit summaries</div></div>

<div style="display:flex;flex-direction:column;gap:12px;margin-bottom:32px;">

  <a href="visit.html" style="text-decoration:none;display:flex;align-items:center;justify-content:space-between;padding:18px 20px;background:var(--surface);border:1px solid var(--border);border-left:3px solid #38bdf8;border-radius:12px;gap:16px;flex-wrap:wrap;">
    <div>
      <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;">May 11, 2026</div>
      <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);">Primary Care · After-Visit Summary</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span style="font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:4px;background:rgba(240,82,82,0.1);color:var(--red);">Crestor stopped</span>
      <span style="font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:4px;background:rgba(56,189,248,0.1);color:#38bdf8;">Xarelto added</span>
      <span style="font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:4px;background:rgba(99,140,210,0.07);color:var(--text3);">CTA ordered</span>
      <span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);">→</span>
    </div>
  </a>

</div>

</div>
<script src="shared-data.js"></script>
</body>
</html>
