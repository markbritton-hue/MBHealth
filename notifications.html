<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Notifications — MBHealth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="wrap">
<header>
  <div>
    <div class="pt-label">Health Dashboard</div>
    <div class="pt-name">Personal Health Dashboard</div>
    <div class="pt-meta">
      <span><em>Updated</em>Apr 24, 2026</span>
      <span><em>Source</em>MyChart · Epic Systems</span>
    </div>
  </div>
  <div class="hdr-right">
    <div class="updated">Last labs: <strong>Apr 24, 2026</strong></div>
  </div>
</header>

<div id="fasting-banner" style="border-radius:10px;padding:11px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;font-family:'DM Mono',monospace;font-size:13px;transition:background .5s;"></div>

<a href="index.html" class="back-btn">← Home</a>

<div class="sec-hdr"><div class="sec-title">Notifications</div><div class="sec-sub">ntfy · markb-healthtrack · Times in ET</div></div>

<div id="notif-cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:13px;max-width:980px;margin-bottom:24px;"></div>

<div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);">To change times or toggle notifications, edit <strong style="color:var(--text2);">notifications.json</strong> in the GitHub repo.</div>

</div>
<script src="shared-data.js"></script>
<script>
const NOTIF_RAW  = 'https://raw.githubusercontent.com/markbritton-hue/MBHealth/main/notifications.json';
const NTFY_TOPIC = 'markb-healthtrack';
let notifConfig  = null;

async function buildNotificationsPage() {
  try {
    const res = await fetch(`${NOTIF_RAW}?t=${Date.now()}`);
    notifConfig = await res.json();
  } catch(e) {
    document.getElementById('notif-cards').innerHTML = '<div style="font-family:\'DM Mono\',monospace;font-size:13px;color:var(--red);">Could not load notifications.json from repo.</div>';
    return;
  }
  const container = document.getElementById('notif-cards');
  container.innerHTML = '';
  notifConfig.notifications.forEach(n => {
    const card = document.createElement('div');
    card.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;';
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
        <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;">${n.label}</div>
        <span style="font-family:'DM Mono',monospace;font-size:11px;padding:3px 8px;border-radius:4px;background:${n.enabled ? 'rgba(34,212,122,0.1)' : 'rgba(99,140,210,0.08)'};color:${n.enabled ? 'var(--green)' : 'var(--text3)'};">${n.enabled ? 'ON' : 'OFF'}</span>
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);margin-bottom:10px;line-height:1.6;">${n.message}</div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <div>
          <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;">Time (ET)</div>
          <input type="time" value="${n.time}" readonly style="background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-family:'DM Mono',monospace;font-size:13px;color:var(--text);outline:none;cursor:default;">
        </div>
        <button id="notif-btn-${n.id}" onclick="notifTest('${n.id}')" style="margin-top:16px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 14px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);cursor:pointer;">Test ▶</button>
        <span id="notif-sent-${n.id}" style="display:none;margin-top:16px;font-family:'DM Mono',monospace;font-size:12px;color:var(--green);">✓ Sent</span>
      </div>`;
    container.appendChild(card);
  });
}

async function notifTest(id) {
  const n = notifConfig.notifications.find(x => x.id === id);
  if (!n) return;
  const btn  = document.getElementById(`notif-btn-${id}`);
  const sent = document.getElementById(`notif-sent-${id}`);
  btn.disabled = true;
  btn.textContent = '…';
  const url = `https://ntfy.sh/${NTFY_TOPIC}?title=${encodeURIComponent(n.label)}&message=${encodeURIComponent(n.message)}`;
  try {
    await fetch(url, { method: 'POST' });
    sent.style.display = 'inline';
    setTimeout(() => { sent.style.display = 'none'; }, 3000);
  } catch(e) {
    console.warn('ntfy test failed', e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Test ▶';
  }
}

buildNotificationsPage();
</script>
</body>
</html>
