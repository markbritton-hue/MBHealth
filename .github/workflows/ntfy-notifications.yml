name: Health Notifications

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      test_id:
        description: 'Notification ID to test (leave empty to run scheduled check)'
        required: false
        default: ''

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send due notifications
        env:
          TEST_ID: ${{ github.event.inputs.test_id }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request, urllib.error
          from datetime import datetime
          from zoneinfo import ZoneInfo

          with open('notifications.json') as f:
              config = json.load(f)

          topic = os.environ.get('NTFY_TOPIC', '').strip()
          if not topic:
              print('ERROR: NTFY_TOPIC secret is not set')
              exit(1)

          tz = ZoneInfo(config['timezone'])
          now = datetime.now(tz)
          cur = now.hour * 60 + now.minute
          test_id = os.environ.get('TEST_ID', '').strip()

          sent = 0
          for n in config['notifications']:
              if test_id:
                  if n['id'] != test_id:
                      continue
              else:
                  if not n.get('enabled', True):
                      continue
                  h, m = map(int, n['time'].split(':'))
                  due = h * 60 + m
                  if not (cur >= due and cur < due + 5):
                      continue

              try:
                  req = urllib.request.Request(
                      f'https://ntfy.sh/{topic}',
                      data=n['message'].encode(),
                      headers={'Title': n['label']},
                      method='POST'
                  )
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      print(f"✓ [{resp.status}] {n['label']} — {n['time']}")
              except urllib.error.URLError as e:
                  print(f"✗ {n['label']} — {e}")
              sent += 1

          if sent == 0:
              print(f"No notifications due at {now.strftime('%H:%M')} ET")
          EOF
